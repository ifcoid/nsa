name: Compile and Publish Binaries

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Garble
        run: go install mvdan.cc/garble@latest

      - name: Compile Binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} garble -literals -tiny build -o dist/if-slr-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/app

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checkout Download Repository
        uses: actions/checkout@v4
        with:
          repository: ifcoid/download
          token: ${{ secrets.GH_PAT }}
          path: download-repo

      - name: Commit and Push Binaries
        run: |
          mkdir -p download-repo/backend-binaries
          cp dist/* download-repo/backend-binaries/
          cd download-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git pull origin main || true
          git add backend-binaries/
          git commit -m "Update SLR backend binaries (commit: ${{ github.sha }})" || echo "No changes to commit"
          git push origin main
