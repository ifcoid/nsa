name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger otomatis saat Anda melakukan push tag baru (contoh: git tag v1.0.0 && git push origin v1.0.0)

# Memberikan akses eksplisit kepada GITHUB_TOKEN bawaan agar bisa membuat Release
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Windows
          - goos: windows
            goarch: amd64
            ext: '.exe'
          # Linux
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          # macOS
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
            
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          
      - name: Download Dependencies
        run: go mod download

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X 'nsa/internal/version.Commit=${{ github.sha }}'" -o if-slr-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/app/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: if-slr-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
