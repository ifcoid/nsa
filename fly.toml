# fly.toml app configuration file generated for leafly
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "apk"
primary_region = "sin"

[build]

[http_service]
  internal_port = 50607
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
